<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>In Loving Memory</title>

<style>
 body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(#050510, #10102b);
    color: white;
}


  /* NIGHT SKY BACKGROUND */
.hero {
  position: relative;
  overflow: hidden;
  background: transparent;
}

/* WHOLE WEBSITE NIGHT SKY */
/* stars container */
#stars {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* individual stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {
    opacity: 0.3;
  }

  to {
    opacity: 1;
  }
}

/* DOVES FLYING FROM BOTTOM TO TOP */
.dove {
  position: absolute;
  bottom: -80px;
  font-size: 45px;
  animation: flyUp linear infinite;
  opacity: 0.8;
}

@keyframes flyUp {
  0% {
    transform: translateY(0) translateX(0);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  80% {
    opacity: 1;
  }

  100% {
    transform: translateY(-110vh) translateX(80px);
    opacity: 0;
  }
}

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    position: sticky;
    top: 0;
  }

  nav button {
    background: none;
    border: none;
    color: #ffd6d6;
    font-size: 16px;
    cursor: pointer;
  }

  nav button:hover {
    text-decoration: underline;
  }

  /* PAGES (ONLY ONE SHOWN) */
 .page {
    display: none;
    padding: 60px 20px;
    text-align: center;
    min-height: 80vh;
    position: relative;
    z-index: 1;
}

  .active {
    display: block;
  }

  /* HOME */
  .hero h1 {
    font-size: 50px;
    color: #ffd6d6;
  }

  .heart {
    font-size: 70px;
    animation: beat 1s infinite;
  }

  @keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* CARDS */
  .card {
    background: rgba(255,255,255,0.08);
    max-width: 700px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
  }

  textarea {
    width: 90%;
    height: 90px;
    border-radius: 10px;
    border: none;
    padding: 10px;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #ff1e4d;
  }

  .message {
    background: rgba(255,255,255,0.1);
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
  }

  /* GALLERY */
  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }

  .gallery img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
  }

  /* GALLERY 1 SECTION */
#gallery1 {
  background: linear-gradient(to bottom, #10102b, #0f1020);
}

#gallery1 h2 {
  color: #ffd6d6;
  font-size: 35px;
  margin-bottom: 25px;
}

/* Gallery 1 photo container */
.gallery1-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* Gallery 1 images */
.gallery1-grid img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  border: 2px solid rgba(255,255,255,0.2);
  transition: 0.4s;
}

/* Hover effect */
.gallery1-grid img:hover {
  transform: scale(1.08);
}

/* CANDLES */
.candle-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.candle {
  width: 35px;
  height: 90px;
  background: #333;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
}

.flame {
  width: 14px;
  height: 22px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -22px;
  left: 10px;
  opacity: 0;
  box-shadow: 0 0 15px orange;
}

.candle.lit .flame {
  opacity: 1;
  animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

</style>
</head>

<script>
  // PAGE SWITCHING (KEY FIX)
 let music = document.getElementById("music");

function startMusic(){
  music.src = "home.mp3";
  music.play();
  document.getElementById("musicBtn").innerHTML = "🔇 Music Playing";
}

// Change music when changing sections
function showPage(pageId) {

  let pages = document.querySelectorAll(".page");
  pages.forEach(page => {
    page.classList.remove("active");
  });

  document.getElementById(pageId).classList.add("active");
  let music = document.getElementById("music");
  if(pageId == "home"){
    music.src = "home.mp3";
  }

   else if(pageId == "galleryPage"){
    music.src = "gallery.mp3";
  }

 else if(pageId == "gallery"){
    music.src = "gallery.mp3";
  }

  else if(pageId == "candles"){
    music.src = "candle.mp3";
  }

  else {
    music.src = "memory.mp3";
  }

  music.play();
}

function openGallery(galleryName){

    let pages = document.querySelectorAll(".page");
    pages.forEach(page => {
        page.classList.remove("active");
    });

    document.getElementById(galleryName).classList.add("active");

    let music = document.getElementById("music");
    if(galleryName == "gallery1"){
        music.src = "gallery1.mp3";
    }

    else if(galleryName == "gallery2"){
        music.src = "gallery2.mp3";
    }
    music.play();
}

  // CANDLES
  function light(candle) {
    candle.classList.toggle("lit");
  }

  // MEMORIES
  function addMemory() {
    let input = document.getElementById("msg");
    if (!input.value.trim()) return;

    let div = document.createElement("div");
    div.className = "message";
    div.innerText = input.value;

    document.getElementById("list").appendChild(div);
    input.value = "";
  }
</script>
