<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>In Loving Memory</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1020;
    color: white;
  }


  /* NIGHT SKY BACKGROUND */
.hero {
  position: relative;
  overflow: hidden;
  background: linear-gradient(#050510, #10102b);
}

/* STARS */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from {
    opacity: 0.3;
  }

  to {
    opacity: 1;
  }
}

/* DOVES FLYING FROM BOTTOM TO TOP */

.dove {
  position: absolute;
  bottom: -80px;
  font-size: 45px;
  animation: flyUp linear infinite;
  opacity: 0.8;
}

@keyframes flyUp {

  0% {
    transform: translateY(0) translateX(0);
    opacity: 0;
  }

  20% {
    opacity: 1;
  }

  80% {
    opacity: 1;
  }

  100% {
    transform: translateY(-110vh) translateX(80px);
    opacity: 0;
  }

}

  /* NAV */
  nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.6);
    padding: 12px;
    position: sticky;
    top: 0;
  }

  nav button {
    background: none;
    border: none;
    color: #ffd6d6;
    font-size: 16px;
    cursor: pointer;
  }

  nav button:hover {
    text-decoration: underline;
  }

  /* PAGES (ONLY ONE SHOWN) */
  .page {
    display: none;
    padding: 60px 20px;
    text-align: center;
    min-height: 80vh;
  }

  .active {
    display: block;
  }

  /* HOME */
  .hero h1 {
    font-size: 50px;
    color: #ffd6d6;
  }

  .heart {
    font-size: 70px;
    animation: beat 1s infinite;
  }

  @keyframes beat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* CARDS */
  .card {
    background: rgba(255,255,255,0.08);
    max-width: 700px;
    margin: auto;
    padding: 20px;
    border-radius: 15px;
  }

  textarea {
    width: 90%;
    height: 90px;
    border-radius: 10px;
    border: none;
    padding: 10px;
  }

  button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #ff1e4d;
  }

  .message {
    background: rgba(255,255,255,0.1);
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
  }

  /* GALLERY */
  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
  }

  .gallery img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
  }

  /* CANDLES */
  .candle-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .candle {
    width: 35px;
    height: 90px;
    background: #333;
    border-radius: 10px;
    position: relative;
    cursor: pointer;
  }

  .flame {
    width: 14px;
    height: 22px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -22px;
    left: 10px;
    opacity: 0;
    box-shadow: 0 0 15px orange;
  }

  .candle.lit .flame {
    opacity: 1;
    animation: flicker 0.2s infinite alternate;
  }

  @keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }

</style>
</head>

<body>

<audio id="music" loop></audio>
 
<!-- NAV -->
<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('memories')">Memories</button>
  <button onclick="showPage('gallery')">Gallery 1 </button>
  <button onclick="showPage('candles')">Candles</button>
</nav>


<!-- HOME -->
<div id="home" class="page active hero">
  <!-- Flying Doves -->
  <div class="dove" style="left:10%; animation-duration:10s;"> 🕊️ </div>
  <div class="dove" style="left:30%; animation-duration:14s; animation-delay:3s;"> 🕊️ </div>
  <div class="dove" style="left:50%; animation-duration:12s; animation-delay:5s;"> 🕊️ </div>
  <div class="dove" style="left:70%; animation-duration:16s; animation-delay:2s;"> 🕊️ </div>
  <div class="dove" style="left:85%; animation-duration:11s; animation-delay:6s;"> 🕊️ </div>

  <h1>In Loving Memory</h1>
  <p> Forever in my heart 💔</p>

  <div class="heart">❤️</div>

  <!-- STARS -->
<div class="star" style="top:20%;left:20%"></div>
<div class="star" style="top:40%;left:70%"></div>
<div class="star" style="top:60%;left:30%"></div>
<div class="star" style="top:15%;left:80%"></div>
<div class="star" style="top:75%;left:50%"></div>


</div>
<!-- MEMORIES -->
<div id="memories" class="page">
  <h2>Memories 💭</h2>

  <div class="card">
    <textarea id="msg"></textarea><br>
    <button onclick="addMemory()">Save Memory</button>
    <div id="list"></div>
  </div>
</div>

<!-- GALLERY -->
<div id="gallery" class="page">
  <h2>Photo Gallery 📸</h2>

  <div class="gallery">
    <img src="images/est.jpeg">
    <img src="images/est28.jpeg">
    <img src="images/est1.jpeg">
    <img src="images/est24.jpeg">
    <img src="images/est6.jpeg">
    <img src="images/est2.jpeg">
    <img src="images/est3.jpeg">
    <img src="images/est21.jpeg">
    <img src="images/est22.jpeg">
    <img src="images/est31.jpeg">
    <img src="images/est4.jpeg">
    <img src="images/est5.jpeg">
    <img src="images/est7.jpeg">
    <img src="images/est8.jpeg">
    <img src="images/est9.jpeg">
    <img src="images/est10.jpeg">
    <img src="images/est11.jpeg">
    <img src="images/est13.jpeg">
    <img src="images/est14.jpeg">
    <img src="images/est15.jpeg">
    <img src="images/est29.jpeg">
    <img src="images/est16.jpeg">
    <img src="images/est27.jpeg">
    <img src="images/est12.jpeg">
    <img src="images/est17.jpeg">
    <img src="images/est26.jpeg">
    <img src="images/est18.jpeg">
    <img src="images/est19.jpeg">
    <img src="images/est20.jpeg">
    <img src="images/est23.jpeg">
    <img src="images/est25.jpeg">
    <img src="images/est30.jpeg">
    
  </div>
</div>

<!-- CANDLES -->
<div id="candles" class="page">
  <h2>Light a Candle 🕯️</h2>

  <div class="candle-container">
    <div class="candle" onclick="light(this)"><div class="flame"></div></div>
    <div class="candle" onclick="light(this)"><div class="flame"></div></div>
    <div class="candle" onclick="light(this)"><div class="flame"></div></div>
    <div class="candle" onclick="light(this)"><div class="flame"></div></div>
  </div>
</div>

<script>
  // PAGE SWITCHING (KEY FIX)
 let music = document.getElementById("music");


function startMusic(){

  music.src = "home.mp3";

  music.play();

  document.getElementById("musicBtn").innerHTML = "🔇 Music Playing";

}



// Change music when changing sections

function showPage(pageId) {

  let pages = document.querySelectorAll(".page");


  pages.forEach(page => {

    page.classList.remove("active");

  });


  document.getElementById(pageId).classList.add("active");


  let music = document.getElementById("music");


  if(pageId == "home"){

    music.src = "home.mp3";

  }


  else if(pageId == "gallery"){

    music.src = "gallery.mp3";

  }


  else if(pageId == "candles"){

    music.src = "candle.mp3";

  }


  else {

    music.src = "memory.mp3";

  }


  music.play();

}

  // CANDLES
  function light(candle) {
    candle.classList.toggle("lit");
  }

  // MEMORIES
  function addMemory() {
    let input = document.getElementById("msg");
    if (!input.value.trim()) return;

    let div = document.createElement("div");
    div.className = "message";
    div.innerText = input.value;

    document.getElementById("list").appendChild(div);
    input.value = "";
  }
</script>

</body>
</html>
